services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m -XX:+UseZGC -XX:+ZGenerational
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/json"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
