services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rsai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m -XX:+UseZGC -XX:+ZGenerational
      - LOG_LEVEL=INFO
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=rsai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      # For Cloud SQL, set CLOUD_SQL_INSTANCE=project:region:instance and leave DB_HOST unset
      # - CLOUD_SQL_INSTANCE=
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/users"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
